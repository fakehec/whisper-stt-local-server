version: '3.8'

services:
  whisper-stt:
    build: .
    container_name: whisper-stt-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./assets/models:/app/assets/models
      - ./assets/cache:/app/assets/cache
      - /usr/lib/x86_64-linux-gnu/libcuda.so.590.48.01:/usr/lib/x86_64-linux-gnu/libcuda.so.1
      - /usr/lib/x86_64-linux-gnu/libnvidia-ml.so.590.48.01:/usr/lib/x86_64-linux-gnu/libnvidia-ml.so.1
    environment:
      - WHISPER_MODEL=medium
      - DEBUG=false
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    devices:
      - /dev/nvidia0:/dev/nvidia0
      - /dev/nvidiactl:/dev/nvidiactl
      - /dev/nvidia-uvm:/dev/nvidia-uvm
      - /dev/nvidia-uvm-tools:/dev/nvidia-uvm-tools
