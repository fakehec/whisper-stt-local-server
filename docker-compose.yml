services:
  whisper-stt:
    build: .
    container_name: whisper-stt-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - whisper-models:/app/assets/models
      - whisper-cache:/app/assets/cache
    environment:
      - WHISPER_MODEL=medium
      - WHISPER_FP16=1
      - COLD_POOL_SIZE=10
      - COLD_WORKER_IDLE_TIMEOUT=60
      - COLD_WORKER_IDLE_STAGGER=10
      - COLD_LANE_TIMEOUT_SECONDS=300
      - DEBUG=false
      # - REDIS_URL=redis://redis:6379
      # - NODE_HOST=whisper-stt-server
      # - NODE_PORT=5000
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    devices:
      - nvidia.com/gpu=all

volumes:
  whisper-models:
  whisper-cache:
